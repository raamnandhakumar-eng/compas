seed: 42
trials_per_resume: 5
temperatures: [0.0]
output_resumes: outputs/resume_permutations.csv
output_results: outputs/screening_results.csv
output_manifest: outputs/run_manifest.json

design:
  study_track: name_signal_extension
  occupations: 8
  base_profiles_per_occupation: 4
  name_signal_groups: 4
  career_gap_conditions: 2
  education_conditions: 2
  planned_resumes: 512
  planned_evaluations: 2560
  stopping_rule: Run every randomized observation once; do not selectively rerun failures.

external_preregistration:
  required_for_live: true
  url_env_var: EXTERNAL_PREREGISTRATION_URL
  accepted_hosts:
    - osf.io
    - aspredicted.org
  source_document: docs/preregistration.md

provider:
  model: set-via-ANTHROPIC_MODEL-before-live-run
  api_version: anthropic-python
  prompt_version: v1.0-locked
  max_tokens: 500
  request_delay_seconds: 0.0

analysis:
  reference_signal_group: signal_b
  cluster_column: resume_id
  fdr_alpha: 0.05
  randomization_inference_permutations: 999
  leave_one_occupation_out: true

name_validation:
  required_for_live: true
  candidate_registry: data/name_validation/name_candidates.csv
  perception_responses: data/name_validation/perception_responses.csv
  summary_output: results/name_validation/name_summary.csv
  balance_output: results/name_validation/name_balance_tests.csv
  target_respondents_min: 100
  target_respondents_max: 200
  minimum_respondents: 100
  minimum_group_agreement: 0.70
  minimum_gender_agreement: 0.70
  minimum_median_confidence: 4.0
  maximum_between_group_ses_range: 0.75
  maximum_between_group_familiarity_range: 0.75
  maximum_between_group_unusual_range: 0.75

signals:
  names:
    signal_a:
      - Arjun Patel
      - Rohan Shah
    signal_b:
      - Ethan Miller
      - Lucas Bennett
    signal_c:
      - Jamal Reed
      - Darius Cole
    signal_d:
      - Carlos Garcia
      - Mateo Rodriguez
  education_pathway:
    - traditional
    - nontraditional
  career_gap_months:
    - 0
    - 12
