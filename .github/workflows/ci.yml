name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
      - run: compas-generate --config config/audit.yaml
      - run: compas-run --config config/audit.yaml --provider mock
      - run: compas-analyze --input outputs/screening_results.csv --output-dir outputs/analysis
