name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run Ruff
        id: ruff
        continue-on-error: true
        run: ruff check . --output-format=json > ruff-results.json
      - name: Upload Ruff diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-results
          path: ruff-results.json
      - name: Enforce Ruff
        if: steps.ruff.outcome == 'failure'
        run: |
          cat ruff-results.json
          exit 1
      - run: pytest -q
      - run: python scripts/power_analysis.py
      - run: compas-validate-names --config config/audit.yaml
      - run: compas-generate --config config/audit.yaml
      - run: compas-run --config config/audit.yaml --provider mock
      - run: compas-analyze --input outputs/screening_results.csv --output-dir outputs/analysis
      - run: python scripts/make_result_figures.py
