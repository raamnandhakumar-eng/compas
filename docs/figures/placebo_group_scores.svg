<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Mean fit scores in the completed placebo run</title>
  <desc id="desc">Mean fit scores by experimental signal group and occupation tier. Scores reflect planted test effects, not Claude behavior.</desc>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#152536">Mean fit scores in the completed placebo run</text>
  <g stroke="#e0e6eb" stroke-width="1">
    <line x1="250" y1="500" x2="1040" y2="500"/><line x1="250" y1="409" x2="1040" y2="409"/>
    <line x1="250" y1="318" x2="1040" y2="318"/><line x1="250" y1="227" x2="1040" y2="227"/>
    <line x1="250" y1="136" x2="1040" y2="136"/><line x1="250" y1="91" x2="1040" y2="91"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#526273" text-anchor="end">
    <text x="235" y="505">6.3</text><text x="235" y="414">6.5</text><text x="235" y="323">6.7</text>
    <text x="235" y="232">6.9</text><text x="235" y="141">7.1</text><text x="235" y="96">7.2</text>
  </g>
  <g fill="#2474a6">
    <rect x="310" y="249" width="58" height="251" rx="3"/>
    <rect x="500" y="158" width="58" height="342" rx="3"/>
    <rect x="690" y="409" width="58" height="91" rx="3"/>
    <rect x="880" y="158" width="58" height="342" rx="3"/>
  </g>
  <g fill="#d97921">
    <rect x="375" y="295" width="58" height="205" rx="3"/>
    <rect x="565" y="204" width="58" height="296" rx="3"/>
    <rect x="755" y="363" width="58" height="137" rx="3"/>
    <rect x="945" y="204" width="58" height="296" rx="3"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#243746" text-anchor="middle">
    <text x="339" y="238">6.85</text><text x="404" y="284">6.75</text>
    <text x="529" y="147">7.05</text><text x="594" y="193">6.95</text>
    <text x="719" y="398">6.50</text><text x="784" y="352">6.60</text>
    <text x="909" y="147">7.05</text><text x="974" y="193">6.95</text>
    <text x="371" y="535">Signal A</text><text x="561" y="535">Signal B</text>
    <text x="751" y="535">Signal C</text><text x="941" y="535">Signal D</text>
  </g>
  <text x="645" y="572" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#33485b">Experimental signal group</text>
  <text x="70" y="300" text-anchor="middle" transform="rotate(-90 70 300)" font-family="Arial, sans-serif" font-size="17" fill="#33485b">Mean fit score</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#33485b">
    <rect x="820" y="70" width="18" height="12" fill="#2474a6"/><text x="845" y="81">Frontline</text>
    <rect x="930" y="70" width="18" height="12" fill="#d97921"/><text x="955" y="81">Knowledge work</text>
  </g>
  <text x="600" y="607" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5b6875">Scores reflect planted test effects, not observed behavior from Claude.</text>
</svg>
