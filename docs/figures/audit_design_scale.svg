<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680"
     viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">COMPAS experimental design</title>
  <desc id="desc">Four role templates, eight candidate names, two education pathways,
  and two career-gap conditions generate 128 matched resumes. Two temperatures and
  five repeated trials produce 1,280 planned model evaluations.</desc>
  <style>
    text { font-family: Inter, Arial, Helvetica, sans-serif; }
    .card-title { font-size: 17px; font-weight: 650; }
    .card-value { font-size: 34px; font-weight: 750; }
    .card-subtitle { font-size: 13px; }
    .operator { font-size: 31px; font-weight: 700; fill: #8291A5; }
  </style>
  <rect width="1200" height="680" fill="#FFFFFF"/>

  <text x="70" y="63" font-size="38" font-weight="750" fill="#12263A">
    COMPAS experimental design
  </text>
  <text x="70" y="94" font-size="18" fill="#5B6B7F">
    A balanced synthetic resume audit that isolates candidate signals while holding qualifications constant
  </text>

  <rect x="48" y="125" width="1104" height="230" rx="24"
        fill="#FBFCFE" stroke="#DCE3EB" stroke-width="2"/>
  <text x="82" y="164" font-size="21" font-weight="700" fill="#223A50">
    1. Construct qualification-matched resumes
  </text>
  
    <rect x="80" y="185" width="180" height="118" rx="18"
          fill="#F5F7FA" stroke="#D7DEE8" stroke-width="2"/>
    <text x="170.0" y="224" text-anchor="middle"
          class="card-title" fill="#334155">Role templates</text>
    <text x="170.0" y="263" text-anchor="middle"
          class="card-value" fill="#15324B">4</text>
    <text x="170.0" y="269" text-anchor="middle"
          class="card-subtitle" fill="#64748B"><tspan x="170.0" dy="14">2 frontline +</tspan><tspan x="170.0" dy="14">2 knowledge-work</tspan></text>
    
    <rect x="290" y="185" width="180" height="118" rx="18"
          fill="#F5F7FA" stroke="#D7DEE8" stroke-width="2"/>
    <text x="380.0" y="224" text-anchor="middle"
          class="card-title" fill="#334155">Candidate names</text>
    <text x="380.0" y="263" text-anchor="middle"
          class="card-value" fill="#15324B">8</text>
    <text x="380.0" y="269" text-anchor="middle"
          class="card-subtitle" fill="#64748B"><tspan x="380.0" dy="14">4 perceived</tspan><tspan x="380.0" dy="14">signal groups</tspan></text>
    
    <rect x="500" y="185" width="180" height="118" rx="18"
          fill="#F5F7FA" stroke="#D7DEE8" stroke-width="2"/>
    <text x="590.0" y="224" text-anchor="middle"
          class="card-title" fill="#334155">Education</text>
    <text x="590.0" y="263" text-anchor="middle"
          class="card-value" fill="#15324B">2</text>
    <text x="590.0" y="269" text-anchor="middle"
          class="card-subtitle" fill="#64748B"><tspan x="590.0" dy="14">traditional /</tspan><tspan x="590.0" dy="14">non-traditional</tspan></text>
    
    <rect x="710" y="185" width="180" height="118" rx="18"
          fill="#F5F7FA" stroke="#D7DEE8" stroke-width="2"/>
    <text x="800.0" y="224" text-anchor="middle"
          class="card-title" fill="#334155">Career gap</text>
    <text x="800.0" y="263" text-anchor="middle"
          class="card-value" fill="#15324B">2</text>
    <text x="800.0" y="269" text-anchor="middle"
          class="card-subtitle" fill="#64748B"><tspan x="800.0" dy="14">0 months /</tspan><tspan x="800.0" dy="14">12 months</tspan></text>
    
    <rect x="950" y="182" width="190" height="124" rx="18"
          fill="#E8F4F6" stroke="#88C6CF" stroke-width="2"/>
    <text x="1045.0" y="221" text-anchor="middle"
          class="card-title" fill="#334155">Matched resumes</text>
    <text x="1045.0" y="260" text-anchor="middle"
          class="card-value" fill="#087F8C">128</text>
    <text x="1045.0" y="266" text-anchor="middle"
          class="card-subtitle" fill="#64748B"><tspan x="1045.0" dy="14">balanced factorial sample</tspan></text>
    
  <text x="275" y="258" text-anchor="middle" class="operator">×</text>
  <text x="485" y="258" text-anchor="middle" class="operator">×</text>
  <text x="695" y="258" text-anchor="middle" class="operator">×</text>
  <text x="920" y="258" text-anchor="middle" class="operator">=</text>
  <text x="82" y="331" font-size="14" fill="#6B7788">
    Fixed within each template: experience, skills, work history, achievements, target role, and core education level.
  </text>

  <path d="M600 356 L600 391" stroke="#8EA0B5" stroke-width="2.5"/>
  <path d="M593 384 L600 395 L607 384" fill="#8EA0B5"/>

  <rect x="48" y="396" width="1104" height="190" rx="24"
        fill="#F4F8FC" stroke="#CDD8E4" stroke-width="2"/>
  <text x="82" y="430" font-size="21" font-weight="700" fill="#223A50">
    2. Repeat structured LLM screening
  </text>
  
    <rect x="105" y="440" width="200" height="100" rx="18"
          fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <text x="205.0" y="479" text-anchor="middle"
          class="card-title" fill="#334155">Matched resumes</text>
    <text x="205.0" y="518" text-anchor="middle"
          class="card-value" fill="#15324B">128</text>
    <text x="205.0" y="524" text-anchor="middle"
          class="card-subtitle" fill="#64748B"></text>
    
    <rect x="365" y="440" width="180" height="100" rx="18"
          fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <text x="455.0" y="479" text-anchor="middle"
          class="card-title" fill="#334155">Temperatures</text>
    <text x="455.0" y="518" text-anchor="middle"
          class="card-value" fill="#15324B">2</text>
    <text x="455.0" y="524" text-anchor="middle"
          class="card-subtitle" fill="#64748B"></text>
    
    <rect x="605" y="440" width="180" height="100" rx="18"
          fill="#FFFFFF" stroke="#D7DEE8" stroke-width="2"/>
    <text x="695.0" y="479" text-anchor="middle"
          class="card-title" fill="#334155">Trials each</text>
    <text x="695.0" y="518" text-anchor="middle"
          class="card-value" fill="#15324B">5</text>
    <text x="695.0" y="524" text-anchor="middle"
          class="card-subtitle" fill="#64748B"></text>
    
    <rect x="865" y="432" width="250" height="116" rx="18"
          fill="#15324B" stroke="#15324B" stroke-width="2"/>
    <text x="990.0" y="471" text-anchor="middle"
          class="card-title" fill="#D9E5EF">Planned evaluations</text>
    <text x="990.0" y="510" text-anchor="middle"
          class="card-value" fill="#FFFFFF">1,280</text>
    <text x="990.0" y="516" text-anchor="middle"
          class="card-subtitle" fill="#64748B"></text>
    
  <text x="335" y="504" text-anchor="middle" class="operator">×</text>
  <text x="575" y="504" text-anchor="middle" class="operator">×</text>
  <text x="825" y="504" text-anchor="middle" class="operator">=</text>

  <rect x="250" y="616" width="700" height="40" rx="10"
        fill="#FFF7E6" stroke="#F2D39B"/>
  <text x="600" y="642" text-anchor="middle" font-size="15" fill="#7A5514">
    Design scale only. This figure does not report live-model demographic bias findings.
  </text>
</svg>
