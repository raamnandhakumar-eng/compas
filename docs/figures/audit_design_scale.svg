<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">COMPAS audit design scale</title>
  <desc id="desc">A chart showing four role templates, four perceived name-signal groups, two education pathways, two career-gap conditions, 128 matched resumes, and 1,280 planned model evaluations.</desc>
  <rect width="1200" height="680" fill="#ffffff"/>

  <text x="70" y="70" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#172033">COMPAS audit design scale</text>
  <text x="70" y="108" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#596579">A balanced synthetic audit built to isolate candidate signals while holding qualifications constant</text>

  <rect x="60" y="145" width="720" height="430" rx="18" fill="#f6f8fb" stroke="#dfe5ec"/>
  <text x="95" y="190" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#172033">Matched resume construction</text>
  <text x="95" y="220" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#697586">Bars show the number of levels or generated resumes in each design component</text>

  <text x="95" y="277" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#27364a">Role templates</text>
  <rect x="290" y="255" width="18" height="28" rx="5" fill="#2b6cb0"/>
  <text x="320" y="276" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#172033">4</text>

  <text x="95" y="337" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#27364a">Name-signal groups</text>
  <rect x="290" y="315" width="18" height="28" rx="5" fill="#2b6cb0"/>
  <text x="320" y="336" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#172033">4</text>

  <text x="95" y="397" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#27364a">Education pathways</text>
  <rect x="290" y="375" width="9" height="28" rx="5" fill="#2b6cb0"/>
  <text x="311" y="396" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#172033">2</text>

  <text x="95" y="457" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#27364a">Career-gap conditions</text>
  <rect x="290" y="435" width="9" height="28" rx="5" fill="#2b6cb0"/>
  <text x="311" y="456" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#172033">2</text>

  <line x1="95" y1="495" x2="740" y2="495" stroke="#d6dde7"/>
  <text x="95" y="540" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#27364a">Generated matched resumes</text>
  <rect x="360" y="516" width="350" height="32" rx="7" fill="#087f8c"/>
  <text x="724" y="539" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#087f8c">128</text>

  <rect x="820" y="145" width="320" height="430" rx="18" fill="#172033"/>
  <text x="855" y="195" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Evaluation plan</text>

  <rect x="855" y="235" width="250" height="70" rx="12" fill="#233149"/>
  <text x="980" y="264" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#b9c5d6">Matched resumes</text>
  <text x="980" y="290" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">128</text>

  <text x="980" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#7dd3da">×</text>

  <rect x="855" y="365" width="115" height="70" rx="12" fill="#233149"/>
  <text x="912" y="393" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b9c5d6">Temperatures</text>
  <text x="912" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">2</text>

  <rect x="990" y="365" width="115" height="70" rx="12" fill="#233149"/>
  <text x="1047" y="393" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#b9c5d6">Trials each</text>
  <text x="1047" y="420" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff">5</text>

  <line x1="855" y1="470" x2="1105" y2="470" stroke="#3a4a63"/>
  <text x="980" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#b9c5d6">Planned model decisions</text>
  <text x="980" y="550" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#ffffff">1,280</text>

  <rect x="60" y="610" width="1080" height="42" rx="10" fill="#fff7e6"/>
  <text x="600" y="637" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#7a5514">Design scale only. This figure does not report live-model demographic bias findings.</text>
</svg>
