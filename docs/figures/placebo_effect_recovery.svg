<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Planted effects were recovered exactly</title>
  <desc id="desc">For five nonzero placebo effects, the estimated fit-score changes match the planted changes to three decimal places.</desc>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#152536">Planted effects were recovered exactly</text>
  <g font-family="Arial, sans-serif" font-size="17" fill="#243746">
    <text x="275" y="127" text-anchor="end">12-month career gap</text>
    <text x="275" y="217" text-anchor="end">Non-traditional education</text>
    <text x="275" y="307" text-anchor="end">Signal A</text>
    <text x="275" y="397" text-anchor="end">Signal C</text>
    <text x="275" y="487" text-anchor="end">Signal C × frontline</text>
  </g>
  <g stroke="#e0e6eb" stroke-width="1">
    <line x1="300" y1="82" x2="300" y2="520"/><line x1="450" y1="82" x2="450" y2="520"/>
    <line x1="600" y1="82" x2="600" y2="520"/><line x1="750" y1="82" x2="750" y2="520"/>
    <line x1="900" y1="82" x2="900" y2="520"/><line x1="1050" y1="82" x2="1050" y2="520"/>
  </g>
  <g fill="#c8d2dc">
    <rect x="375" y="104" width="675" height="18" rx="3"/>
    <rect x="825" y="194" width="225" height="18" rx="3"/>
    <rect x="750" y="284" width="300" height="18" rx="3"/>
    <rect x="525" y="374" width="525" height="18" rx="3"/>
    <rect x="750" y="464" width="300" height="18" rx="3"/>
  </g>
  <g fill="#1f6f8b">
    <rect x="375" y="128" width="675" height="18" rx="3"/>
    <rect x="825" y="218" width="225" height="18" rx="3"/>
    <rect x="750" y="308" width="300" height="18" rx="3"/>
    <rect x="525" y="398" width="525" height="18" rx="3"/>
    <rect x="750" y="488" width="300" height="18" rx="3"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="15" fill="#526273" text-anchor="middle">
    <text x="300" y="548">−0.5</text><text x="450" y="548">−0.4</text><text x="600" y="548">−0.3</text>
    <text x="750" y="548">−0.2</text><text x="900" y="548">−0.1</text><text x="1050" y="548">0.0</text>
  </g>
  <text x="675" y="579" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#33485b">Change in fit score</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#33485b">
    <rect x="885" y="78" width="18" height="12" fill="#c8d2dc"/><text x="910" y="89">Planted</text>
    <rect x="985" y="78" width="18" height="12" fill="#1f6f8b"/><text x="1010" y="89">Recovered</text>
  </g>
  <text x="600" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#5b6875">Placebo validation only. Mean absolute recovery error: 0.000 points.</text>
</svg>
